### menu setup ###
[menu __main __setup]
type: list
enable: {not printer.idle_timeout.state == "Printing"}
name: Setup

[menu __main __setup __save_config]
type: command
name: Save config
gcode: SAVE_CONFIG

### menu bedScrew ###
[menu __main __setup __bedScrew]
type: list
enable: {not printer.idle_timeout.state == "Printing"}
name: bedscrew

[menu __main __setup __bedScrew __Start]
type:command
name: Start Screw Adjust
gcode:
	G28 X0 Y0
	G28 Z0
    BED_SCREWS_ADJUST

[menu __main __setup __bedScrew __Accept]
type:command
name: Accept  	
gcode:
    ACCEPT

[menu __main __setup __bedScrew __Adjusted]
type:command
name: Adjusted
gcode:
    ADJUSTED

[menu __main __setup __bedScrew __Abort]
type:command
name: Abort
gcode:
    ABORT

[menu __main __setup __restart]
type: list
name: Restart

[menu __main __setup __restart __host_restart]
type: command
enable: {not printer.idle_timeout.state == "Printing"}
name: Restart host
gcode: RESTART

[menu __main __setup __restart __firmware_restart]
type: command
enable: {not printer.idle_timeout.state == "Printing"}
name: Restart FW
gcode: FIRMWARE_RESTART

[menu __main __setup __dump]
type: command
name: Dump parameters
gcode:
   {% for name1 in printer %}
      {% for name2 in printer[name1] %}
         { action_respond_info("printer['%s'].%s = %s"
                               % (name1, name2, printer[name1][name2])) }
      {% else %}
         { action_respond_info("printer['%s'] = %s" % (name1, printer[name1])) }
      {% endfor %}
   {% endfor %}

 ## Power Off LCD Menu Item
[menu __main __power_off]
type: command
enable: {not printer.idle_timeout.state == "Printing"}
name: Power Off
index: 0
gcode:
    {menu.exit()}
    PRINTER_OFF

