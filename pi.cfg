#####################################################################
#     LCD Menu, Macro and Tempsensor
#####################################################################

[gcode_macro _SHUTDOWN_PI]
gcode:
  {action_call_remote_method("shutdown_machine")}

[gcode_macro PRINTER_OFF]
gcode:
  M117 PI Off in 5 sec
  G4 P5000
  M400
  _SHUTDOWN_PI

#####################################################################
#   RPi
#####################################################################
[temperature_sensor RPi]
sensor_type: temperature_host
min_temp: 10
max_temp: 100
gcode_id: PI
