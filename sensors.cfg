[thermistor chamber_temp]
temperature1: 25
resistance1: 10000
beta: 3950

[temperature_sensor rPI]
sensor_type: temperature_host
min_temp: 10
max_temp: 100
gcode_id: PI

[temperature_sensor Spider]
sensor_type: temperature_mcu
min_temp: 10
max_temp: 100
gcode_id: Spider
